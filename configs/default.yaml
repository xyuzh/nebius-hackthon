env:
  robot: "unitree_go2"
  image_size: [640, 480]
  dt: 0.002
  max_steps: 200

collection:
  num_workers: 4
  rollouts_per_worker: 10
  policy: "scripted"

cosmos:
  model_id: "nvidia/Cosmos-Predict2-2B-Video2World"
  torch_dtype: "bfloat16"
  num_input_frames: 9
  num_predicted_frames: 33

ray:
  num_gpu_workers: 2

video:
  fps: 24
  output_dir: "outputs"

app:
  server_name: "0.0.0.0"
  server_port: 7860
